<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Banner Management — Admin</title>
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/layout2.css">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar" id="adminSidebar">
      <a href="../index.html" class="admin-sidebar__logo"><span style="color:var(--color-gold)">✦</span> SHIVANI</a>
      <nav class="admin-sidebar__nav">
        <a href="index.html" class="admin-sidebar__link"><span class="admin-sidebar__link-icon">📊</span> Dashboard</a>
        <a href="products.html" class="admin-sidebar__link"><span class="admin-sidebar__link-icon">💎</span> Products</a>
        <a href="orders.html" class="admin-sidebar__link"><span class="admin-sidebar__link-icon">📦</span> Orders</a>
        <a href="banners.html" class="admin-sidebar__link active"><span class="admin-sidebar__link-icon">🖼</span> Banners</a>
      </nav>
    </aside>
    <div class="admin-main">
      <div class="admin-header">
        <button class="admin-header__toggle" onclick="document.getElementById('adminSidebar').classList.toggle('active')">☰</button>
        <h1 class="admin-header__title">Banner Management</h1>
        <button class="btn btn-primary btn-sm" onclick="ShivaniUtils.showToast('Banner editor — connect Firebase Storage for uploads','info')">+ Add Banner</button>
      </div>
      <div class="admin-content">
        <div class="data-table-wrapper" style="padding:var(--space-6)">
          <p style="color:var(--color-gray-500);margin-bottom:var(--space-4)">Manage homepage banners and promotional offers. Connect Firebase Storage for image uploads.</p>
          <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:var(--space-4)">
            <div class="checkout-card" style="position:relative;overflow:hidden">
              <img src="https://images.unsplash.com/photo-1515562141589-67f0d7dbe3c5?w=600&h=300&fit=crop" alt="Banner 1" style="width:100%;height:160px;object-fit:cover;border-radius:var(--radius-md);margin-bottom:var(--space-3)">
              <h4 style="font-size:var(--text-sm)">Hero Banner — New Collection 2026</h4>
              <p style="font-size:var(--text-xs);color:var(--color-gray-400)">Active • Homepage Hero</p>
            </div>
            <div class="checkout-card" style="position:relative;overflow:hidden">
              <div style="width:100%;height:160px;background:linear-gradient(135deg,var(--color-gray-900),#2A2621);border-radius:var(--radius-md);margin-bottom:var(--space-3);display:flex;align-items:center;justify-content:center;color:var(--color-gold);font-family:var(--font-display);font-size:var(--text-xl)">Bridal Season Sale ✨</div>
              <h4 style="font-size:var(--text-sm)">Bridal Sale Banner</h4>
              <p style="font-size:var(--text-xs);color:var(--color-gray-400)">Active • Homepage Mid-section</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
    <!-- Firebase SDK (Compat) -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-analytics-compat.js"></script>

<script src="../js/utils.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/cart.js"></script>
  <script src="../js/wishlist.js"></script>
  <script src="../js/products.js"></script>
  <script src="../js/admin.js"></script>
  <script>document.addEventListener('DOMContentLoaded', () => ShivaniFirebase.init());</script>
</body>
</html>
