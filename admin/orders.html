<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orders Management — Shivani Jewellery</title>
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body class="admin-body">
  <div class="admin-layout">
    <!-- Sidebar -->
    <aside class="admin-sidebar" id="adminSidebar">
      <a href="../index.html" class="admin-sidebar__logo">SHIVANI</a>
      <nav class="admin-sidebar__nav">
        <a href="index.html" class="admin-sidebar__link"><span class="admin-sidebar__link-icon">📊</span> Dashboard</a>
        <a href="products.html" class="admin-sidebar__link"><span class="admin-sidebar__link-icon">💎</span> Products</a>
        <a href="orders.html" class="admin-sidebar__link active"><span class="admin-sidebar__link-icon">📦</span> Orders</a>
        <a href="#" class="admin-sidebar__link" onclick="ShivaniAdmin.logout();return false;" style="margin-top:auto;color:var(--color-error)"><span class="admin-sidebar__link-icon">🚪</span> Logout</a>
      </nav>
    </aside>

    <!-- Main -->
    <div class="admin-main">
      <div class="admin-header">
        <button class="admin-header__toggle" onclick="document.getElementById('adminSidebar').classList.toggle('active')">☰</button>
        <h1 class="admin-header__title">Orders Management</h1>
        <div style="font-size:var(--text-sm);color:var(--admin-text-muted)">Tracking Customer Orders</div>
      </div>
      
      <div class="admin-content animate-fade-in-up">
        <div class="data-table-wrapper" id="adminOrderTable">
          <div style="padding:40px;text-align:center;color:var(--admin-text-muted)">Fetching customer orders...</div>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/utils.js"></script>
  <script type="module">
    import { init, logout } from '../js/admin.js';
    window.ShivaniAdmin = { logout };
    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
