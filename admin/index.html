<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — Shivani Jewellery</title>
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body class="admin-body">
  <div class="admin-layout">
    <!-- Sidebar -->
    <aside class="admin-sidebar" id="adminSidebar">
      <a href="../index.html" class="admin-sidebar__logo">SHIVANI</a>
      <nav class="admin-sidebar__nav">
        <a href="index.html" class="admin-sidebar__link active"><span class="admin-sidebar__link-icon">📊</span> Dashboard</a>
        <a href="products.html" class="admin-sidebar__link"><span class="admin-sidebar__link-icon">💎</span> Products</a>
        <a href="orders.html" class="admin-sidebar__link"><span class="admin-sidebar__link-icon">📦</span> Orders</a>
        <a href="#" class="admin-sidebar__link" onclick="ShivaniAdmin.logout();return false;" style="margin-top:auto;color:var(--color-error)"><span class="admin-sidebar__link-icon">🚪</span> Logout</a>
      </nav>
    </aside>

    <!-- Main -->
    <div class="admin-main">
      <div class="admin-header">
        <button class="admin-header__toggle" onclick="document.getElementById('adminSidebar').classList.toggle('active')">☰</button>
        <h1 class="admin-header__title">Dashboard</h1>
        <div style="font-size:var(--text-sm);color:var(--admin-text-muted)">Welcome back, <span style="color:var(--admin-gold)">Aman</span></div>
      </div>
      
      <div class="admin-content animate-fade-in-up">
        <!-- Stats Grid -->
        <div class="stats-grid" id="adminStats">
          <div class="stat-card skeleton" style="height:120px"></div>
          <div class="stat-card skeleton" style="height:120px"></div>
          <div class="stat-card skeleton" style="height:120px"></div>
          <div class="stat-card skeleton" style="height:120px"></div>
        </div>

        <!-- Recent Orders -->
        <div class="data-table-wrapper">
          <div class="data-table-header">
            <h3 style="font-size:18px;font-family:var(--font-display)">Recent Orders</h3>
            <a href="orders.html" class="admin-btn admin-btn-outline" style="font-size:12px;padding:6px 12px">View All</a>
          </div>
          <div id="recentOrders">
            <!-- Loaded via JS -->
            <div style="padding:40px;text-align:center;color:var(--admin-text-muted)">Loading tracking data...</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/utils.js"></script>
  <script type="module">
    import { init as initAdmin, logout } from '../js/admin.js';
    window.ShivaniAdmin = { logout }; // Expose logout for HTML attributes
    document.addEventListener('DOMContentLoaded', () => {
      initAdmin();
    });
  </script>
</body>
</html>
