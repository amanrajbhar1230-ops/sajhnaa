<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — Shivani Jewellery</title>
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/layout2.css">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
  <div class="admin-layout">
    <!-- Sidebar -->
    <aside class="admin-sidebar" id="adminSidebar">
      <a href="../index.html" class="admin-sidebar__logo"><span style="color:var(--color-gold)">✦</span> SHIVANI</a>
      <nav class="admin-sidebar__nav">
        <a href="index.html" class="admin-sidebar__link active"><span class="admin-sidebar__link-icon">📊</span> Dashboard</a>
        <a href="products.html" class="admin-sidebar__link"><span class="admin-sidebar__link-icon">💎</span> Products</a>
        <a href="orders.html" class="admin-sidebar__link"><span class="admin-sidebar__link-icon">📦</span> Orders</a>
        <a href="banners.html" class="admin-sidebar__link"><span class="admin-sidebar__link-icon">🖼</span> Banners</a>
        <a href="../index.html" class="admin-sidebar__link" style="margin-top:auto"><span class="admin-sidebar__link-icon">🏠</span> View Store</a>
      </nav>
    </aside>

    <!-- Main -->
    <div class="admin-main">
      <div class="admin-header">
        <button class="admin-header__toggle" onclick="document.getElementById('adminSidebar').classList.toggle('active')">☰</button>
        <h1 class="admin-header__title">Dashboard</h1>
        <div style="font-size:var(--text-sm);color:var(--color-gray-500)">Welcome, Admin</div>
      </div>
      <div class="admin-content">
        <!-- Stats -->
        <div class="stats-grid" id="adminStats"></div>

        <!-- Recent Orders -->
        <div class="data-table-wrapper">
          <div class="data-table-header">
            <h3 style="font-size:var(--text-lg)">Recent Orders</h3>
            <a href="orders.html" class="btn btn-sm btn-ghost">View All →</a>
          </div>
          <div id="recentOrders"></div>
        </div>
      </div>
    </div>
  </div>

    <!-- Firebase SDK (Compat) -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-analytics-compat.js"></script>

<script src="../js/utils.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/cart.js"></script>
  <script src="../js/wishlist.js"></script>
  <script src="../js/products.js"></script>
  <script src="../js/admin.js"></script>
  <script>document.addEventListener('DOMContentLoaded', () => { ShivaniFirebase.init(); ShivaniAdmin.init(); });</script>
</body>
</html>
