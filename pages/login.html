<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login / Register — Shivani Jewellery</title>
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/layout2.css">
  <link rel="stylesheet" href="../css/pages.css">
</head>
<body>
  <div id="siteHeader"></div>
  <main class="main">
    <div class="auth-page">
      <div class="auth-card animate-scale-in">
        <h2 class="auth-card__title">Welcome to Shivani</h2>
        <p class="auth-card__subtitle">Sign in to your account or create a new one</p>

        <!-- Tabs -->
        <div class="tabs" style="margin-bottom:var(--space-6)">
          <button class="tab active" onclick="switchAuthTab('login', this)">Sign In</button>
          <button class="tab" onclick="switchAuthTab('register', this)">Register</button>
        </div>

        <!-- Login Form -->
        <div id="tab-login" class="tab-content active">
          <form onsubmit="event.preventDefault();handleLogin();">
            <div class="form-group"><label for="loginEmail">Email</label><input type="email" id="loginEmail" placeholder="your@email.com" required></div>
            <div class="form-group"><label for="loginPassword">Password</label><input type="password" id="loginPassword" placeholder="Enter password" required minlength="6"></div>
            <div style="text-align:right;margin-bottom:var(--space-4)"><a href="#" onclick="handleForgotPassword();return false;" style="font-size:var(--text-sm)">Forgot Password?</a></div>
            <button type="submit" class="btn btn-primary btn-full btn-lg">Sign In</button>
          </form>
        </div>

        <!-- Register Form -->
        <div id="tab-register" class="tab-content">
          <form onsubmit="event.preventDefault();handleRegister();">
            <div class="form-group"><label for="regName">Full Name</label><input type="text" id="regName" placeholder="Your name" required></div>
            <div class="form-group"><label for="regEmail">Email</label><input type="email" id="regEmail" placeholder="your@email.com" required></div>
            <div class="form-group"><label for="regPassword">Password</label><input type="password" id="regPassword" placeholder="Min 6 characters" required minlength="6"></div>
            <button type="submit" class="btn btn-primary btn-full btn-lg">Create Account</button>
          </form>
        </div>

        <div class="auth-divider"><span>or continue with</span></div>
        <button class="google-btn" onclick="handleGoogleLogin()">
          <svg width="20" height="20" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          Continue with Google
        </button>
        <p class="auth-link">By signing up, you agree to our <a href="#">Terms</a> & <a href="#">Privacy Policy</a></p>
      </div>
    </div>
  </main>
  <div id="siteFooter"></div>
  <script src="../js/utils.js"></script>
  <script type="module">
    import { init, signIn, signUp, signInWithGoogle, resetPassword } from '../js/auth.js';
    
    // Global UI state/tabs
    window.switchAuthTab = (tabId, btn) => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('tab-' + tabId).classList.add('active');
    };

    window.handleLogin = async () => {
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;
      try { 
        await signIn(email, password); 
        window.location.href = '../index.html'; 
      } catch(e) {}
    };

    window.handleRegister = async () => {
      const name = document.getElementById('regName').value;
      const email = document.getElementById('regEmail').value;
      const password = document.getElementById('regPassword').value;
      try { 
        await signUp(email, password, name); 
        window.location.href = '../index.html'; 
      } catch(e) {}
    };

    window.handleGoogleLogin = async () => {
      try { 
        await signInWithGoogle(); 
        window.location.href = '../index.html'; 
      } catch(e) {}
    };

    window.handleForgotPassword = () => {
      const email = prompt('Enter your email for password reset:');
      if (email) resetPassword(email);
    };

    document.addEventListener('DOMContentLoaded', init);
  </script>
  <!-- Main app logic for header/footer (loaded after module init) -->
  <script src="../js/cart.js"></script>
  <script src="../js/wishlist.js"></script>
  <script src="../js/products.js"></script>
  <script src="../js/search.js"></script>
  <script src="../js/chatbot.js"></script>
  <script src="../js/app.js"></script>
</body>
</html>
