<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us — Shivani Jewellery</title>
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/layout2.css">
  <link rel="stylesheet" href="../css/pages.css">
</head>
<body>
  <div id="siteHeader"></div>
  <main class="main">
    <div class="info-page">
      <h1>Contact Us</h1>
      <p style="color:var(--color-gray-500);margin-bottom:var(--space-8)">We'd love to hear from you. Reach out to us for any queries.</p>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:var(--space-6);margin-bottom:var(--space-10);text-align:center">
        <div class="checkout-card"><div style="font-size:2rem;margin-bottom:var(--space-3)">📧</div><h4>Email</h4><p style="font-size:var(--text-sm)">hello@shivanijewellery.com</p></div>
        <div class="checkout-card"><div style="font-size:2rem;margin-bottom:var(--space-3)">📱</div><h4>WhatsApp</h4><p style="font-size:var(--text-sm)">+91 98765 43210</p></div>
        <div class="checkout-card"><div style="font-size:2rem;margin-bottom:var(--space-3)">🕐</div><h4>Hours</h4><p style="font-size:var(--text-sm)">Mon-Sat, 10am - 7pm</p></div>
      </div>
      <div class="contact-form">
        <h3 style="margin-bottom:var(--space-6)">Send us a message</h3>
        <form onsubmit="event.preventDefault();ShivaniUtils.showToast('Message sent! We\'ll get back to you soon.');this.reset();">
          <div class="form-row">
            <div class="form-group"><label>Name</label><input type="text" placeholder="Your name" required></div>
            <div class="form-group"><label>Email</label><input type="email" placeholder="your@email.com" required></div>
          </div>
          <div class="form-group"><label>Subject</label><input type="text" placeholder="What's this about?"></div>
          <div class="form-group"><label>Message</label><textarea placeholder="Tell us how we can help..." required></textarea></div>
          <button type="submit" class="btn btn-primary btn-lg">Send Message</button>
        </form>
      </div>
    </div>
  </main>
  <div id="siteFooter"></div>
    <!-- Firebase SDK (Compat) -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-analytics-compat.js"></script>

<script src="../js/utils.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/cart.js"></script>
  <script src="../js/wishlist.js"></script>
  <script src="../js/products.js"></script>
  <script src="../js/search.js"></script>
  <script src="../js/chatbot.js"></script>
  <script src="../js/app.js"></script>
</body>
</html>
