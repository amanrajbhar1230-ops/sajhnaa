<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart — Shivani Jewellery</title>
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/layout2.css">
  <link rel="stylesheet" href="../css/pages.css">
</head>
<body>
  <div id="siteHeader"></div>
  <main class="main">
    <div class="container section">
      <h1 style="margin-bottom:var(--space-6)">Shopping Cart</h1>
      <div class="cart-layout">
        <div id="cartItems"></div>
        <div id="cartSummary">
          <div class="cart-summary">
            <h3 class="cart-summary__title">Order Summary</h3>
            <div id="cartTotals"></div>
            <div class="cart-summary__coupon">
              <label style="font-size:var(--text-sm);font-weight:500;margin-bottom:var(--space-2);display:block">Coupon Code</label>
              <div class="coupon-group">
                <input type="text" id="couponInput" placeholder="Enter code">
                <button class="btn btn-secondary btn-sm" onclick="ShivaniCart.applyCoupon(document.getElementById('couponInput').value)">Apply</button>
              </div>
              <p style="font-size:var(--text-xs);color:var(--color-gray-400);margin-top:var(--space-2)">Try: WELCOME15, SHIVANI10, FLAT200</p>
            </div>
            <a href="checkout.html" class="btn btn-primary btn-full btn-lg" style="margin-top:var(--space-4)">Proceed to Checkout</a>
            <a href="products.html" class="btn btn-ghost btn-full" style="margin-top:var(--space-2)">Continue Shopping</a>
          </div>
        </div>
      </div>
    </div>
  </main>
  <div id="siteFooter"></div>
    <!-- Firebase SDK (Compat) -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-analytics-compat.js"></script>

<script src="../js/utils.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/cart.js"></script>
  <script src="../js/wishlist.js"></script>
  <script src="../js/products.js"></script>
  <script src="../js/search.js"></script>
  <script src="../js/chatbot.js"></script>
  <script src="../js/app.js"></script>
  <script>document.addEventListener('DOMContentLoaded', () => ShivaniCart.renderCartPage());</script>
</body>
</html>
