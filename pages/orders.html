<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Orders — Shivani Jewellery</title>
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/layout2.css">
  <link rel="stylesheet" href="../css/pages.css">
</head>
<body>
  <div id="siteHeader"></div>
  <main class="main">
    <div class="container section">
      <h1 style="margin-bottom:var(--space-6)">My Orders</h1>
      <div id="ordersList"></div>
    </div>
  </main>
  <!-- Tracking Modal -->
  <div id="trackingModal"><div class="modal-overlay" onclick="this.classList.remove('active')"><div class="modal" onclick="event.stopPropagation()"><div class="modal__header"><h3 class="modal__title">Order Tracking</h3><span class="modal__close" onclick="this.closest('.modal-overlay').classList.remove('active')">×</span></div><div class="modal__body"></div></div></div></div>
  <div id="siteFooter"></div>
    <!-- Firebase SDK (Compat) -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-analytics-compat.js"></script>

<script src="../js/utils.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/cart.js"></script>
  <script src="../js/wishlist.js"></script>
  <script src="../js/products.js"></script>
  <script src="../js/orders.js"></script>
  <script src="../js/search.js"></script>
  <script src="../js/chatbot.js"></script>
  <script src="../js/app.js"></script>
  <script>document.addEventListener('DOMContentLoaded', () => ShivaniOrders.renderOrdersPage());</script>
</body>
</html>
